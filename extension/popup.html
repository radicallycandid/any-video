<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Any Video</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Any Video</h1>
      <p class="subtitle">YouTube Transcriber</p>
    </header>

    <!-- Status indicator -->
    <div id="server-status" class="status">
      <span class="status-dot"></span>
      <span class="status-text">Checking server...</span>
    </div>

    <!-- Not on YouTube message -->
    <div id="not-youtube" class="message hidden">
      <p>Navigate to a YouTube video to use this extension.</p>
    </div>

    <!-- Main controls -->
    <div id="controls" class="hidden">
      <div class="video-info">
        <p id="video-url" class="url"></p>
      </div>

      <div class="options">
        <label for="model">Whisper Model:</label>
        <select id="model">
          <option value="tiny">Tiny (fastest)</option>
          <option value="small" selected>Small (balanced)</option>
          <option value="large-v3">Large-v3 (best quality)</option>
        </select>
      </div>

      <button id="process-btn" class="primary-btn">
        Transcribe & Summarize
      </button>
    </div>

    <!-- Progress -->
    <div id="progress" class="hidden">
      <div class="spinner"></div>
      <p id="progress-text">Processing video...</p>
      <p class="hint">This may take a few minutes for longer videos.</p>
      <button id="cancel-btn" class="secondary-btn cancel-btn">Cancel</button>
    </div>

    <!-- Results -->
    <div id="results" class="hidden">
      <div class="tabs">
        <button class="tab active" data-tab="summary">Summary</button>
        <button class="tab" data-tab="transcript">Transcript</button>
        <button class="tab" data-tab="quiz">Quiz</button>
      </div>

      <div class="tab-content">
        <div id="summary-tab" class="tab-pane active">
          <div id="summary-content" class="content"></div>
        </div>
        <div id="transcript-tab" class="tab-pane hidden">
          <div id="transcript-content" class="content"></div>
        </div>
        <div id="quiz-tab" class="tab-pane hidden">
          <div id="quiz-content" class="content"></div>
        </div>
      </div>

      <div class="actions">
        <button id="copy-btn" class="secondary-btn">Copy Current Tab</button>
        <button id="new-btn" class="secondary-btn">Process Another</button>
      </div>
    </div>

    <!-- Error -->
    <div id="error" class="hidden">
      <p class="error-title">Error</p>
      <p id="error-message"></p>
      <button id="retry-btn" class="secondary-btn">Try Again</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
